name: admission_queue_frontend_prod

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_BASE_URL: ${VITE_BASE_URL}
        VITE_WS_URL: ${VITE_WS_URL}
        VITE_PUBLIC_BASE_PATH: ${VITE_PUBLIC_BASE_PATH}
    container_name: aq-frontend-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:18081:80"
    networks:
      - pk_proxy

networks:
  pk_proxy:
    external: true
    name: pk_proxy
